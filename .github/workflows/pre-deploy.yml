name: Pre-Deployment Checks

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  validate:
    name: Validate Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run pre-deployment checks
        run: bun run pre-deploy
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || 'mock_password_for_ci' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'mock_jwt_secret_with_at_least_32_chars_here' }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || 'https://example.com' }}

  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: validate
    if: always()

    steps:
      - name: Check validation status
        run: |
          if [ "${{ needs.validate.result }}" != "success" ]; then
            echo "Pre-deployment validation did not pass"
            echo "Please fix the issues before deploying"
            exit 1
          else
            echo "All pre-deployment checks passed"
            echo "Ready to deploy!"
          fi

      - name: Comment on PR (if applicable)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ needs.validate.result }}' === 'success' ? '[OK] Passed' : '[FAIL] Did not pass';
            const body = `## Pre-Deployment Validation ${status}

            **Checks performed:**
            - Tests (bun test)
            - Production build (next build)

            ${status.includes('Passed') ? 'Ready to merge and deploy!' : 'Please fix the issues before merging.'}`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
